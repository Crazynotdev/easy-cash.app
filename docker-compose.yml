version: '3.8'

services:
  # Frontend Mobile (Expo)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.expo
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=0.0.0.0
      - EXPO_DEBUG=true
    networks:
      - easycash-network

  # Backend Firebase Emulators
  firebase:
    build:
      context: ./backend
      dockerfile: Dockerfile.emulator
    ports:
      - "4000:4000"  # Emulator UI
      - "8080:8080"  # Firestore
      - "9099:9099"  # Auth
      - "5001:5001"  # Functions
      - "9199:9199"  # Storage
      - "9000:9000"  # Realtime Database
      - "8085:8085"  # Pub/Sub
    volumes:
      - ./backend:/app
      - firebase-data:/root/.cache/firebase/emulators
    environment:
      - FIREBASE_PROJECT=easycash-dev
      - GCP_PROJECT=easycash-dev
    networks:
      - easycash-network

  # PostgreSQL for Analytics
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: easycash
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - easycash-network

  # Redis for Caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    networks:
      - easycash-network

  # Admin Panel Web
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./admin:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:5001
      - REACT_APP_FIREBASE_PROJECT=easycash-dev
    networks:
      - easycash-network
    depends_on:
      - firebase
      - postgres

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    networks:
      - easycash-network
    depends_on:
      - frontend
      - admin

  # MongoDB for Logs
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo123}
      MONGO_INITDB_DATABASE: easycash_logs
    volumes:
      - mongo-data:/data/db
    networks:
      - easycash-network

  # Elasticsearch for Search
  elasticsearch:
    image: elasticsearch:8.10.2
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    networks:
      - easycash-network

  # Kibana for Visualization
  kibana:
    image: kibana:8.10.2
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - easycash-network
    depends_on:
      - elasticsearch

  # Prometheus for Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - easycash-network

  # Grafana for Visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - easycash-network
    depends_on:
      - prometheus

  # Adminer for DB Management
  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - easycash-network

  # Mailhog for Email Testing
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - easycash-network

  # MinIO for S3-compatible Storage
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio123}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - easycash-network

  # RabbitMQ for Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"  # AMQP
      - "15672:15672" # Management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbit123}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - easycash-network

networks:
  easycash-network:
    driver: bridge

volumes:
  firebase-data:
  postgres-data:
  redis-data:
  mongo-data:
  elastic-data:
  prometheus-data:
  grafana-data:
  minio-data:
  rabbitmq-data:
